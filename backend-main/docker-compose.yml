services:
  backend:
    build: .
    container_name: web-api
    depends_on:
      - db
    networks:
      - backend
    env_file:
      - .env
    ports:
      - 4000:4000

  db:
    image: postgres:18.3-alpine3.23
    ports:
      - 5432:5432
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    networks:
      - backend
    volumes:
      - pgdata:/var/lib/postgresql

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: 'localpg@admin.com'
      PGADMIN_DEFAULT_PASSWORD: ${DB_PASSWORD}
    ports:
      - 5050:80
    networks:
      - backend

networks:
  backend:

volumes:
  pgdata: